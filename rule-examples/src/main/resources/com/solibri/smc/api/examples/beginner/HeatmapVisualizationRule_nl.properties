DEFAULT_NAME=Heatmap-visualisatieregel
DEFAULT_DESCRIPTION=Deze regel visualiseert het heatmapgebied van effectbronnen die zich binnen het bereik van de gecontroleerde componenten bevinden. Het heatmapgebied wordt alleen gevisualiseerd op het gebied van de gecontroleerde componenten. Het heatmapgebied wordt in stappen vanaf elke effectbron gevisualiseerd. De gebruiker definieert de gecontroleerde componenten en de effectbronnen. De gebruiker stelt ook de waarden voor bereik en staplengte van de heatmap in.

UI.HeatmapVisualizationRule.TITLE = Heatmap-visualisatieregel
UI.HeatmapVisualizationRule.DESCRIPTION = <html>Deze regel visualiseert het heatmapgebied van effectbronnen<br>die zich binnen het bereik van de gecontroleerde componenten bevinden. Het heatmapgebied<br>wordt alleen gevisualiseerd op het gebied van de gecontroleerde componenten.</html>

rpComponentFilter.NAME = Gecontroleerde componenten
rpComponentFilter.DESCRIPTION = Gecontroleerde componenten waarop de heatmap van de effectbron wordt gevisualiseerd.

rpEffectSourceFilter.NAME = Effectbronnen
rpEffectSourceFilter.DESCRIPTION = Effectbronnen.

UI.HeatmapVisualizationParameter.TITLE = Visualisatie
UI.HeatmapVisualizationParameter.DESCRIPTION = Deze parameters bepalen het bereik en de staplengte van het gevisualiseerde effect.

rpRange.NAME = Effectbereik (A)
rpRange.DESCRIPTION = Hiermee wordt het bereik van het gevisualiseerde effect vanaf de bron bepaald.

rpStep.NAME = Effectstaplengte (B)
rpStep.DESCRIPTION = Hiermee wordt de staplengte van het gevisualiseerde effect vanaf de bron bepaald.

