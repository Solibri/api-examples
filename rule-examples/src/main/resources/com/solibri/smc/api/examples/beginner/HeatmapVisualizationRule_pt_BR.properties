DEFAULT_NAME=Regra de visualização de mapa de calor
DEFAULT_DESCRIPTION=Esta regra visualiza a área do mapa de calor a partir das fontes de efeito que estão dentro do alcance dos componentes verificados. A área do mapa de calor é visualizada apenas na área dos componentes verificados. A área do mapa de calor é visualizada em etapas a partir de cada fonte de efeito. O usuário definirá os componentes verificados e as fontes de efeito. O usuário também definirá os valores de alcance e comprimento da etapa do mapa de calor.

UI.HeatmapVisualizationRule.TITLE = Regra de visualização de mapa de calor
UI.HeatmapVisualizationRule.DESCRIPTION = <html>Esta regra visualiza a área do mapa de calor a partir das fontes de efeito<br>que estão dentro do alcance dos componentes verificados. A área do mapa de calor<br>é visualizada apenas na área dos componentes verificados.</html>

rpComponentFilter.NAME = Componentes verificados
rpComponentFilter.DESCRIPTION = Componentes verificados nos quais o mapa de calor da fonte de efeito é visualizado.

rpEffectSourceFilter.NAME = Fontes de efeito
rpEffectSourceFilter.DESCRIPTION = Fontes de efeito.

UI.HeatmapVisualizationParameter.TITLE = Visualização
UI.HeatmapVisualizationParameter.DESCRIPTION = Estes parâmetros especificam o alcance e o comprimento da etapa do efeito visualizado.

rpRange.NAME = Alcance do efeito (A)
rpRange.DESCRIPTION = Isso define o alcance do efeito visualizado a partir da fonte.

rpStep.NAME = Comprimento da etapa do efeito (B)
rpStep.DESCRIPTION = Isso define o comprimento da etapa do efeito visualizado a partir da fonte.

