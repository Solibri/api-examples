DEFAULT_NAME=Regla de visualizacion de mapa de calor
DEFAULT_DESCRIPTION=Esta regla visualiza el area del mapa de calor a partir de las fuentes de efecto que estan dentro del alcance de los componentes comprobados. El area del mapa de calor se visualiza solo sobre el area de los componentes comprobados. El area del mapa de calor se visualiza por pasos desde cada fuente de efecto. El usuario definira los componentes comprobados y las fuentes de efecto. El usuario tambien establecera los valores del alcance y de la longitud del paso del mapa de calor.

UI.HeatmapVisualizationRule.TITLE = Regla de visualizacion de mapa de calor
UI.HeatmapVisualizationRule.DESCRIPTION = <html>Esta regla visualiza el area del mapa de calor a partir de las fuentes de efecto<br>que estan dentro del alcance de los componentes comprobados. El area del mapa de calor<br>se visualiza solo sobre el area de los componentes comprobados.</html>

rpComponentFilter.NAME = Componentes comprobados
rpComponentFilter.DESCRIPTION = Componentes comprobados en los que se visualiza el mapa de calor de la fuente de efecto.

rpEffectSourceFilter.NAME = Fuentes de efecto
rpEffectSourceFilter.DESCRIPTION = Fuentes de efecto.

UI.HeatmapVisualizationParameter.TITLE = Visualizacion
UI.HeatmapVisualizationParameter.DESCRIPTION = Estos parametros especifican el alcance y la longitud del paso del efecto visualizado.

rpRange.NAME = Alcance del efecto (A)
rpRange.DESCRIPTION = Esto define el alcance del efecto visualizado desde la fuente.

rpStep.NAME = Longitud del paso del efecto (B)
rpStep.DESCRIPTION = Esto define la longitud del paso del efecto visualizado desde la fuente.

