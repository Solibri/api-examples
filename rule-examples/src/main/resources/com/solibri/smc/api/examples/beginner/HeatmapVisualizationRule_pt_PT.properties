DEFAULT_NAME=Regra de visualização de mapa de calor
DEFAULT_DESCRIPTION=Esta regra visualiza a área do mapa de calor a partir das fontes de efeito que se encontram dentro do alcance dos componentes verificados. A área do mapa de calor é visualizada apenas na área dos componentes verificados. A área do mapa de calor é visualizada por passos a partir de cada fonte de efeito. O utilizador define os componentes verificados e as fontes de efeito. O utilizador define também os valores de alcance e de comprimento de passo do mapa de calor.

UI.HeatmapVisualizationRule.TITLE = Regra de visualização de mapa de calor
UI.HeatmapVisualizationRule.DESCRIPTION = <html>Esta regra visualiza a área do mapa de calor a partir das fontes de efeito<br>que se encontram dentro do alcance dos componentes verificados. A área do mapa de calor<br>é visualizada apenas na área dos componentes verificados.</html>

rpComponentFilter.NAME = Componentes verificados
rpComponentFilter.DESCRIPTION = Componentes verificados onde o mapa de calor da fonte de efeito é visualizado.

rpEffectSourceFilter.NAME = Fontes de efeito
rpEffectSourceFilter.DESCRIPTION = Fontes de efeito.

UI.HeatmapVisualizationParameter.TITLE = Visualização
UI.HeatmapVisualizationParameter.DESCRIPTION = Estes parâmetros especificam o alcance e o comprimento do passo do efeito visualizado.

rpRange.NAME = Alcance do efeito (A)
rpRange.DESCRIPTION = Define o alcance do efeito visualizado a partir da fonte.

rpStep.NAME = Comprimento do passo do efeito (B)
rpStep.DESCRIPTION = Define o comprimento do passo do efeito visualizado a partir da fonte.

