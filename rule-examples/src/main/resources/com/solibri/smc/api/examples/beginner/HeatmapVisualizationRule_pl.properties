DEFAULT_NAME=Reguła wizualizacji mapy ciepła
DEFAULT_DESCRIPTION=Ta reguła wizualizuje obszar mapy ciepła pochodzący od źródeł oddziaływania znajdujących się w zasięgu sprawdzanych komponentów. Obszar mapy ciepła jest wizualizowany tylko na obszarze sprawdzanych komponentów. Obszar mapy ciepła jest wizualizowany w krokach od każdego źródła oddziaływania. Użytkownik definiuje sprawdzane komponenty oraz źródła oddziaływania. Użytkownik ustawia także wartości zasięgu i długości kroku mapy ciepła.

UI.HeatmapVisualizationRule.TITLE = Reguła wizualizacji mapy ciepła
UI.HeatmapVisualizationRule.DESCRIPTION = <html>Ta reguła wizualizuje obszar mapy ciepła pochodzący od źródeł oddziaływania,<br>znajdujących się w zasięgu sprawdzanych komponentów. Obszar mapy ciepła<br>jest wizualizowany tylko na obszarze sprawdzanych komponentów.</html>

